scraper:
  seed_urls:
    - "https://www.uts.edu.au"
  allowed_prefixes:     # restrict by path prefix, or [] to crawl all of uts.edu.au
    - "/for-students"
  skip_keywords:        # skip URLs whose path contains any of these substrings
    - "news"
    - "events"
    - "media"
    - "speakers-and-speeches"
    - "graduation/speakers"
    - "alumni"
    - "blog"
    - "stories"
    - "showcase"
    - "gallery"
    - "video"
    - "podcast"
    - "newsletter"
    - "archive"
    - "awards-ceremony"
    - "award-recipients"
    - "prizes-awards-and-competitions"
  max_pages: null        # no page limit — crawl until exhausted
  max_depth: null        # no depth limit — follow all links
  delay: 0.5             # seconds between requests
  timeout: 30            # seconds to wait for a page response
  checkpoint_every: 100   # save to disk every N pages (for resume on disconnect)
  output_path: "data/raw_pages.json"

chunker:
  breakpoint_threshold_type: "percentile"  # "percentile", "standard_deviation", or "interquartile"
  breakpoint_threshold_amount: 95          # higher = fewer, larger chunks; lower = more, smaller chunks

embeddings:
  provider: "openai"     # "openai" or "ollama" — rebuild index if changed
  model: "text-embedding-3-small"  # openai: "text-embedding-3-small" | ollama: "nomic-embed-text"

vectorstore:
  index_path: "data/faiss_index"

llm:
  provider: "openai"     # "openai" (needs OPENAI_API_KEY) or "ollama" (local)
  model: "gpt-4.1-mini"   # openai: "gpt-4o", "gpt-4o-mini" | ollama: "llama3", "mistral", etc.
  temperature: 0         # 0 = deterministic, 1 = creative

retriever:
  k: 6                   # number of chunks to retrieve per query
